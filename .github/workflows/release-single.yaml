name: Release single device

on:
  workflow_call:
    inputs:
      device-id:
        type: string
      magisk-preinit-device:
        type: string
        default: ''
      publish-pages:
        type: string
        default: 'true'
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      device-id:
        description: Device ID
        required: true
      magisk-preinit-device:
        description: Magisk preinit device
        required: false
      skip-rootless:
        description: skip building rootless OTA
        type: boolean
        required: false
      upload-test-ota:
        description: Upload OTA to test folder
        required: false
        type: boolean
      force-build:
        description: Force artifacts to be built and uploaded to release if non-existing
        required: false
        type: boolean
      force-ota-server-upload:
        description: Force OTA server upload
        required: false
        type: boolean
      skip-release:
        description: Skip release (build only)
        required: false
        type: boolean
      rooted-graphene-version:
        description: Git ref of rooted graphene repo to use
        required: false
      ota-version:
        description: OTA version
        required: false
      additional-env:
        description: Additional env var key value pairs, space separated, e.g. "A=1 B=2"
        default: ''
      publish-pages:
        description: Commit rootless device JSON to gh-pages (set false for test builds)
        default: 'true'
jobs:
  build-device:
    runs-on: ubuntu-latest
    timeout-minutes: 20 # Make sure to not waste hours when some command does not return 
    steps:
      - name: Checkout rooted-graphene script repository
        uses: actions/checkout@v4
        with:
          repository: schnatterer/rooted-graphene
          ref: ${{ github.event.inputs.rooted-graphene-version || inputs.rooted-graphene-version || 'main' }} 
          fetch-depth: 1 # Efficent checkout, we only need the one ref
      - name: Checkout OTA repository for updating OTA server on GitHub Pages
        uses: actions/checkout@v4
        with:
          path: ota # Corresponds to PAGES_REPO_FOLDER
          fetch-depth: 0 # Allow for switching to github-pages branch
      - name: Set inputs
        # Empty means, use version defined in rooted-ota.sh
        # Note the difference between github.event.inputs (workflow_dispatch) and inputs (workflow_call)
        run: |
          echo "DEVICE_ID=$(echo '${{ github.event.inputs.device-id || inputs.device-id || 'shiba' }}' | xargs)" >> $GITHUB_ENV
          echo "MAGISK_PREINIT_DEVICE=$(echo '${{ github.event.inputs.magisk-preinit-device || inputs.magisk-preinit-device || '' }}' | xargs)" >> $GITHUB_ENV
          
          echo "OTA_VERSION=$(echo '${{ github.event.inputs.ota-version || '' }}' | xargs)" >> $GITHUB_ENV
          echo "FORCE_OTA_SERVER_UPLOAD=$(echo '${{ github.event.inputs.force-ota-server-upload || '' }}' | xargs)" >> $GITHUB_ENV
          echo "FORCE_BUILD=$(echo '${{ github.event.inputs.force-build || '' }}' | xargs)" >> $GITHUB_ENV
          echo "UPLOAD_TEST_OTA=$(echo '${{ github.event.inputs.upload-test-ota || '' }}' | xargs)" >> $GITHUB_ENV
          # Rootless is now built by the pixeneos engine in the build-rootless job below.
          # Force the schnatterer build to magisk-only so it does not also publish rootless/<device>.json.
          echo "SKIP_ROOTLESS=true" >> $GITHUB_ENV
          echo "SKIP_RELEASE=$(echo '${{ github.event.inputs.skip-release || '' }}' | xargs)" >> $GITHUB_ENV
          
          if [[ "${{ github.event_name }}" == "push" ]]  || [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Running on push: Simple build without release for device $DEVICE_ID"
            echo "FORCE_BUILD=true" >> $GITHUB_ENV
            echo "SKIP_RELEASE=true" >> $GITHUB_ENV
          fi
          
          # Split additional-env and set each key-value pair as an environment variable
          IFS=' ' read -r -a env_vars <<< '${{ github.event.inputs.additional-env || '' }}'
          for key_value_pair in "${env_vars[@]}"; do
            echo "$key_value_pair" >> $GITHUB_ENV
          done
      - run: sudo apt-get install -y jq curl git
      - name: release
        env:
          PASSPHRASE_AVB: ${{ secrets.PASSPHRASE_AVB }}
          PASSPHRASE_OTA: ${{ secrets.PASSPHRASE_OTA }}
          KEY_AVB_BASE64: ${{ secrets.KEY_AVB_BASE64 }}
          CERT_OTA_BASE64: ${{ secrets.CERT_OTA_BASE64 }}
          KEY_OTA_BASE64: ${{ secrets.KEY_OTA_BASE64 }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          PAGES_REPO_FOLDER: 'ota'
        run: |
          if [[ $SKIP_RELEASE == 'true' ]]; then
            DEBUG=1 bash -c '. rooted-ota.sh && createRootedOta && createOtaServerData'
          else
            DEBUG=1 bash -c '. rooted-ota.sh && createAndReleaseRootedOta'
          fi
  build-rootless:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout OTA repository (release assets + GitHub Pages)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Allow switching to the gh-pages branch

      - name: Checkout pixeneos build engine
        uses: actions/checkout@v4
        with:
          repository: mrbathwater/pixeneos
          ref: main
          path: pixeneos
          fetch-depth: 1

      - name: Resolve inputs
        run: |
          echo "DEVICE_NAME=$(echo '${{ github.event.inputs.device-id || inputs.device-id || 'shiba' }}' | xargs)" >> $GITHUB_ENV
          echo "PUBLISH_PAGES=$(echo '${{ github.event.inputs.publish-pages || inputs.publish-pages || 'true' }}' | xargs)" >> $GITHUB_ENV

      - run: sudo apt-get update && sudo apt-get install -y jq curl git unzip xxd zip

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build rootless OTA with pixeneos (+ Hail)
        shell: bash
        working-directory: pixeneos
        env:
          INTERACTIVE_MODE: false
          CLEANUP: true
          DEVICE_NAME: ${{ env.DEVICE_NAME }}
          GRAPHENEOS_UPDATE_CHANNEL: stable-security-preview
          ADDITIONALS_ROOT: false
          PASSPHRASE_AVB: ${{ secrets.PASSPHRASE_AVB }}
          PASSPHRASE_OTA: ${{ secrets.PASSPHRASE_OTA }}
          KEYS_AVB_BASE64: ${{ secrets.KEY_AVB_BASE64 }}
          KEYS_OTA_BASE64: ${{ secrets.KEY_OTA_BASE64 }}
          KEYS_CERT_OTA_BASE64: ${{ secrets.CERT_OTA_BASE64 }}
        run: |
          set -euo pipefail
          # Build only (download deps + patch + sign + csig + device JSON).
          # Publishing is done by this repo in the next steps.
          . src/main.sh
          echo "OUTPUTS_PATCHED_OTA=${OUTPUTS[PATCHED_OTA]}" >> "$GITHUB_ENV"
          echo "GRAPHENEOS_VERSION=${VERSION[GRAPHENEOS]}" >> "$GITHUB_ENV"

      - name: Upload build artifacts (for inspection)
        uses: actions/upload-artifact@v4
        with:
          name: rootless-${{ env.DEVICE_NAME }}
          path: |
            pixeneos/${{ env.OUTPUTS_PATCHED_OTA }}.csig
            pixeneos/${{ env.DEVICE_NAME }}.json

      - name: Upload OTA + csig to the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          asset="pixeneos/${OUTPUTS_PATCHED_OTA}"
          # The magisk job runs in parallel and may not have created this
          # version's release yet (versions can differ per device), so create
          # it if missing. `|| true` tolerates a concurrent create race.
          if ! gh release view "${GRAPHENEOS_VERSION}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "${GRAPHENEOS_VERSION}" --repo "${{ github.repository }}" \
              --title "${GRAPHENEOS_VERSION}" \
              --notes "Update to [GrapheneOS ${GRAPHENEOS_VERSION}](https://grapheneos.org/releases#${GRAPHENEOS_VERSION})." || true
          fi
          gh release upload "${GRAPHENEOS_VERSION}" \
            "${asset}" "${asset}.csig" \
            --repo "${{ github.repository }}" --clobber

      - name: Publish device JSON to gh-pages/rootless
        if: env.PUBLISH_PAGES != 'false'
        shell: bash
        run: |
          set -euo pipefail
          cp "pixeneos/${DEVICE_NAME}.json" "/tmp/${DEVICE_NAME}.json"
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git checkout gh-pages
          mkdir -p rootless
          target="rootless/${DEVICE_NAME}.json"
          if ! grep -q "${GRAPHENEOS_VERSION}" "${target}" 2>/dev/null; then
            cp "/tmp/${DEVICE_NAME}.json" "${target}"
            git add "${target}"
          else
            echo "rootless/${DEVICE_NAME}.json already at ${GRAPHENEOS_VERSION}; skipping."
          fi
          if ! git diff-index --quiet HEAD; then
            git commit -m "rootless: ${DEVICE_NAME} -> GrapheneOS ${GRAPHENEOS_VERSION} (pixeneos + Hail)"
            for i in $(seq 1 10); do
              git pull --rebase origin gh-pages && git push origin gh-pages && break
              echo "retry $i"; sleep 2
            done
          fi